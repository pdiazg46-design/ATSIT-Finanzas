name: Auto Release Windows & macOS App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Package Windows (.exe)
        run: npx electron-builder --win nsis

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATSIT-Finanzas-Windows
          path: dist/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Package macOS (.dmg & .zip)
        run: npx electron-builder --mac zip dmg

      - name: Upload macOS Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATSIT-Finanzas-macOS
          path: |
            dist/*.dmg
            dist/*.zip

  create-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: ATSIT-Finanzas-Windows
          path: release-files

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: ATSIT-Finanzas-macOS
          path: release-files

      - name: Create Automatic Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: "ATSIT Finanzas Pro v1.0.0"
          body: "Descargas oficiales directas para Windows (.exe) y Mac (.dmg)."
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
